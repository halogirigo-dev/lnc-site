# ── Nginx Configuration — Lombok Nature Culture ────────────────
# Server: Hostinger VPS (Ubuntu 22.04)
# PHP version: 8.2+
# Structure:
#   /var/www/lnc/public_html/  — PHP frontend (served at lomboknatureculture.com)
#   /var/www/lnc/backend/      — Laravel 12 + Filament (served at /admin, /api)

server {
    listen 80;
    listen [::]:80;
    server_name lomboknatureculture.com www.lomboknatureculture.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lomboknatureculture.com www.lomboknatureculture.com;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/lomboknatureculture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lomboknatureculture.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/lnc/public_html;
    index index.php index.html;

    # Charset & security headers
    charset utf-8;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Laravel Admin Panel (/admin) ──────────────────────────────
    location ^~ /admin {
        alias /var/www/lnc/backend/public;
        try_files $uri $uri/ @laravel;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/lnc/backend/public/index.php;
            fastcgi_param DOCUMENT_ROOT  /var/www/lnc/backend/public;
        }
    }

    location @laravel {
        rewrite /admin/(.*)$ /admin/index.php?/$1 last;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lnc/backend/public/index.php;
    }

    # ── Laravel API (/api) ────────────────────────────────────────
    location ^~ /api {
        alias /var/www/lnc/backend/public;
        try_files $uri $uri/ @laravel_api;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/lnc/backend/public/index.php;
            fastcgi_param DOCUMENT_ROOT  /var/www/lnc/backend/public;
        }
    }

    location @laravel_api {
        rewrite /api/(.*)$ /api/index.php?/$1 last;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/lnc/backend/public/index.php;
    }

    # ── PHP Frontend (main site) ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.env|deploy\.php|create-tables\.php|\.git) {
        deny all;
        return 403;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=10M\npost_max_size=10M";
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Static assets with caching
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Uploads directory — no PHP execution
    location /uploads/ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/lnc-access.log;
    error_log  /var/log/nginx/lnc-error.log;
}
