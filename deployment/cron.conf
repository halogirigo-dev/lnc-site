# ── Cron Configuration — LNC Production ──────────────────────
# Add to crontab: crontab -e -u www-data
# Or: /etc/cron.d/lnc

# Laravel scheduler (runs every minute)
* * * * * www-data php /var/www/lnc/backend/artisan schedule:run >> /dev/null 2>&1

# Database backup (daily at 3:00 AM)
0 3 * * * www-data pg_dump -U lnc_user -h 127.0.0.1 lnc_production | gzip > /var/www/lnc/backups/db_$(date +\%Y\%m\%d).sql.gz 2>/dev/null

# Keep only last 14 days of backups
0 4 * * * www-data find /var/www/lnc/backups/ -name "db_*.sql.gz" -mtime +14 -delete

# Clear expired sessions (weekly)
0 2 * * 0 www-data php /var/www/lnc/backend/artisan session:gc >> /dev/null 2>&1

# Warm OPcache after deploy (triggered by deploy hook, not cron)
# php /var/www/lnc/backend/artisan opcache:clear
