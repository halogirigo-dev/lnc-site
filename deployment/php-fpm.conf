; ── PHP-FPM Pool Configuration — LNC Production ──────────────
; File: /etc/php/8.2/fpm/pool.d/lnc.conf
; Replaces or augments www.conf

[lnc]
user = www-data
group = www-data

; Socket path (must match nginx fastcgi_pass)
listen = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Slow log
slowlog = /var/log/php8.2-fpm/lnc-slow.log
request_slowlog_timeout = 5s

; Security
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,popen,proc_open
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php8.2-fpm/lnc-error.log
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[upload_max_filesize] = 10M
php_admin_value[post_max_size] = 12M

; Session security
php_admin_value[session.cookie_secure] = 1
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.cookie_samesite] = Lax
php_admin_value[session.use_strict_mode] = 1

; OPcache
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.validate_timestamps] = 0

; Environment variables for PHP frontend
env[DB_CONNECTION] = pgsql
; Note: sensitive vars (DB_PASS, MIDTRANS keys) are in /var/www/lnc/public_html/.env
