name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup PHP ───────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pgsql, mbstring, xml, curl, zip

      # ── 3. Validate Composer (dry run) ─────────────────────────
      - name: Validate composer.json
        working-directory: ./backend
        run: |
          if [ -f composer.json ]; then
            echo "✓ composer.json present"
          else
            echo "✗ Missing backend/composer.json"
            exit 1
          fi

      # ── 4. Deploy via SSH ──────────────────────────────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            echo "=== [1/8] Pull latest code ==="
            cd /var/www/lnc
            git fetch --all
            git reset --hard origin/main
            echo "✓ Code updated"

            echo "=== [2/8] Install Laravel dependencies ==="
            cd /var/www/lnc/backend
            composer install --no-dev --optimize-autoloader --no-interaction --quiet
            echo "✓ Composer done"

            echo "=== [3/8] Run database migrations ==="
            php artisan migrate --force
            echo "✓ Migrations done"

            echo "=== [4/8] Cache Laravel config/routes/views ==="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✓ Cache optimized"

            echo "=== [5/8] Restart queue workers ==="
            php artisan queue:restart
            sleep 2
            echo "✓ Queue workers restarted"

            echo "=== [6/8] Clear OPcache ==="
            sudo systemctl reload php8.2-fpm || true
            echo "✓ PHP-FPM reloaded"

            echo "=== [7/8] Fix permissions ==="
            sudo chown -R www-data:www-data /var/www/lnc/backend/storage
            sudo chown -R www-data:www-data /var/www/lnc/backend/bootstrap/cache
            echo "✓ Permissions fixed"

            echo "=== [8/8] Test site health ==="
            sleep 3
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://lomboknatureculture.com/ || true)
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "301" ] || [ "$HTTP_STATUS" = "302" ]; then
              echo "✓ Site responding: HTTP $HTTP_STATUS"
            else
              echo "⚠ Warning: HTTP $HTTP_STATUS — check manually"
            fi

            echo ""
            echo "=== Deploy complete ==="

      # ── 5. Notify on failure ───────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠ Deploy failed! Check GitHub Actions logs."
          # Add Slack/email notification here if desired
